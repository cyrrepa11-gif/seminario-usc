<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Administrador - Seminario USCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Estilos para el carnet en el modal */
        .modal-carnet-admin {
            display: none;
            position: fixed;
            z-index: 1100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-carnet-admin.active {
            display: flex;
        }
        .carnet-preview {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .carnet-preview .carnet {
            margin: 0 auto;
            position: relative;
            background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%);
            color: white;
            border-radius: 16px;
            padding: 1.5rem;
        }
        .btn-imprimir {
            background: #0f3460;
            margin-top: 1rem;
        }
        /* Centrar QR */
        #carnetQRAdmin {
            display: flex;
            justify-content: center;
        }
        /* Ajuste para impresión */
        @media print {
            .modal-carnet-admin {
                position: absolute;
                background: white;
            }
            .carnet-preview {
                box-shadow: none;
                padding: 0;
            }
            .btn, .close {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- Pantalla de login -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <i class="fas fa-lock" style="font-size: 3rem; color:#0f3460;"></i>
        <h2>Acceso Administrador</h2>
        <input type="password" id="adminPassword" placeholder="Contraseña" onkeypress="if(event.key==='Enter') verificarLogin()">
        <button onclick="verificarLogin()">Ingresar</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- Panel Admin -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <div class="logo-area">
            <img src="assets/logo.png" alt="Logo">
            <h1>ADMINISTRADOR</h1>
        </div>
        <div class="user-area">
            <span class="user-email"><i class="fas fa-envelope"></i> admin@usca.com</span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></div>
            <div class="nav-item" data-tab="evento"><i class="fas fa-calendar-alt"></i> <span>Evento</span></div>
            <div class="nav-item" data-tab="agenda"><i class="fas fa-list-ul"></i> <span>Agenda</span></div>
            <div class="nav-item" data-tab="auspiciantes"><i class="fas fa-handshake"></i> <span>Auspiciantes</span></div>
            <div class="nav-item" data-tab="inscritos"><i class="fas fa-users"></i> <span>Inscritos</span></div>
            <div class="nav-item" data-tab="scanner"><i class="fas fa-qrcode"></i> <span>Escáner QR</span></div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </div>
</div>

<!-- Modal para ver imagen grande -->
<div id="modalImagen" class="modal-imagen" onclick="cerrarModalImagen()"><img id="imgGrande" src=""></div>

<!-- Modal para previsualizar carnet -->
<div id="modalCarnetAdmin" class="modal-carnet-admin">
    <div class="carnet-preview">
        <span style="float: right; font-size: 24px; cursor: pointer;" onclick="cerrarModalCarnetAdmin()">&times;</span>
        <div id="carnetAdminContent"></div>
        <button class="btn" onclick="imprimirCarnet()"><i class="fas fa-print"></i> Imprimir</button>
        <button class="btn btn-imprimir" onclick="descargarCarnetAdmin()"><i class="fas fa-download"></i> Descargar PNG</button>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDCMQjh5PCz2f17xxhMF0JkGAjliCBreUg",
        authDomain: "seminario-usca.firebaseapp.com",
        databaseURL: "https://seminario-usca-default-rtdb.firebaseio.com",
        projectId: "seminario-usca",
        storageBucket: "seminario-usca.firebasestorage.app",
        messagingSenderId: "560733409147",
        appId: "1:560733409147:web:13f01f10f3ee961ab677de"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    // ==================== VARIABLES GLOBALES ====================
    let agenda = [];
    let auspiciantes = [];
    let inscritos = [];
    let eventInfo = {};
    let scannerActive = false, scannerStream = null, scannerAnimation = null;
    let searchTerm = '';
    
    // ==================== FUNCIONES DE CARGA EN TIEMPO REAL ====================
    function cargarDatos() {
        db.ref('agenda').on('value', snap => {
            if(snap.val()) agenda = Object.values(snap.val());
            else agenda = [];
            if(document.getElementById('listaAgenda')) actualizarListaAgenda();
            if(document.getElementById('chartInscritos')) actualizarDashboard();
        });
        db.ref('auspiciantes').on('value', snap => {
            if(snap.val()) auspiciantes = Object.values(snap.val());
            else auspiciantes = [];
            if(document.getElementById('listaAuspiciantes')) actualizarListaAuspiciantes();
        });
        db.ref('inscritos').on('value', snap => {
            if(snap.val()) inscritos = Object.values(snap.val());
            else inscritos = [];
            if(document.getElementById('listaInscritosContainer')) actualizarListaInscritos();
            if(document.getElementById('chartInscritos')) actualizarDashboard();
        });
        db.ref('evento').on('value', snap => {
            if(snap.val()) eventInfo = snap.val();
            else {
                eventInfo = {
                    descripcion: "Evento de actualización quirúrgica",
                    fecha: "2026-08-08",
                    horaInicio: "08:00",
                    horaFin: "17:00"
                };
                db.ref('evento').set(eventInfo);
            }
            if(document.getElementById('descEvento')) cargarEventoAlFormulario();
            if(document.getElementById('chartInscritos')) actualizarDashboard();
        });
    }
    
    // ==================== FUNCIONES DE VISTA ====================
    function actualizarDashboard() {
        const total = inscritos.length, pagos = inscritos.filter(i=>i.pagoVerificado).length, presentes = inscritos.filter(i=>i.presente).length;
        document.getElementById('kpiContainer').innerHTML = `
            <div class="kpi-card"><div class="kpi-info"><h3>Inscritos</h3><div class="kpi-number">${total}</div></div><div class="kpi-icon"><i class="fas fa-users"></i></div></div>
            <div class="kpi-card"><div class="kpi-info"><h3>Pagos verificados</h3><div class="kpi-number">${pagos}</div></div><div class="kpi-icon"><i class="fas fa-credit-card"></i></div></div>
            <div class="kpi-card"><div class="kpi-info"><h3>Asistencia confirmada</h3><div class="kpi-number">${presentes}</div></div><div class="kpi-icon"><i class="fas fa-check-circle"></i></div></div>
            <div class="kpi-card"><div class="kpi-info"><h3>Actividades</h3><div class="kpi-number">${agenda.length}</div></div><div class="kpi-icon"><i class="fas fa-calendar"></i></div></div>
        `;
        document.getElementById('resumenEvento').innerHTML = `📅 ${new Date(eventInfo.fecha).toLocaleDateString('es-ES')} - ${eventInfo.horaInicio} a ${eventInfo.horaFin}`;
        const ctx = document.getElementById('chartInscritos')?.getContext('2d');
        if(ctx) {
            new Chart(ctx, { type: 'doughnut', data: { labels: ['Confirmados', 'Pendientes'], datasets: [{ data: [presentes, total-presentes], backgroundColor: ['#16c784', '#e94560'] }] } });
        }
    }
    
    function cargarEventoAlFormulario() {
        document.getElementById('descEvento').value = eventInfo.descripcion;
        document.getElementById('fechaEvento').value = eventInfo.fecha;
        document.getElementById('horaInicio').value = eventInfo.horaInicio;
        document.getElementById('horaFin').value = eventInfo.horaFin;
    }
    
    function actualizarListaAgenda() {
        const container = document.getElementById('listaAgenda');
        container.innerHTML = agenda.map(a => `
            <div class="list-item"><div><strong>${a.hora}</strong> - ${a.tema}<br><small>${a.speaker||''}</small></div><button class="btn btn-sm btn-danger" onclick="eliminarActividad('${a.id}')">Eliminar</button></div>
        `).join('');
    }
    
    function actualizarListaAuspiciantes() {
        const container = document.getElementById('listaAuspiciantes');
        container.innerHTML = auspiciantes.map(a => `
            <div class="list-item"><div style="display:flex; align-items:center; gap:10px;">${a.imagen ? `<img src="${a.imagen}" style="height:40px; border-radius:8px;">` : '<i class="fas fa-building" style="font-size:1.8rem;"></i>'}<strong>${a.nombre}</strong></div><button class="btn btn-sm btn-danger" onclick="eliminarAuspiciante('${a.id}')">Eliminar</button></div>
        `).join('');
    }
    
    function resaltarPalabras(texto, busqueda) {
        if (!busqueda.trim()) return texto;
        const palabras = busqueda.trim().split(/\s+/);
        let resultado = texto;
        palabras.forEach(palabra => {
            if (palabra.length === 0) return;
            const escapado = palabra.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapado})`, 'gi');
            resultado = resultado.replace(regex, `<span class="highlight">$1</span>`);
        });
        return resultado;
    }
    
    function textoNormalizadoSinEspacios(str) {
        return str.toLowerCase().replace(/\s/g, '');
    }
    
    // ---- FUNCIÓN DEL CARNET PARA ADMIN (con logo sin borde, QR con datos legibles) ----
    function mostrarCarnetAdmin(nombreCompleto, ci, id) {
        // El contenido del QR incluye nombre, cédula y el ID (para que el escáner lo reconozca)
        const qrTexto = `ID: ${id}\nNombre: ${nombreCompleto}\nCI: ${ci}`;
        const container = document.getElementById('carnetAdminContent');
        container.innerHTML = `
            <div class="carnet" style="position: relative; padding: 1.5rem;">
                <!-- Logo circular sin borde ni fondo extra -->
                <div style="position: absolute; top: 15px; left: 15px;">
                    <img src="assets/logo.png" style="width: 70px; height: 70px; object-fit: cover; border-radius: 50%; background: transparent;">
                </div>
                <!-- Título centrado -->
                <div style="text-align: center; font-weight: 800; font-size: 1.2rem; line-height: 1.3; margin: 0 0 20px 0;">
                    III Seminario de<br>Actualización Quirúrgica
                </div>
                <!-- Nombre del participante centrado -->
                <div class="carnet-nombre" style="font-size: 1.4rem; font-weight: 800; margin: 10px 0 5px; text-align: center;">${nombreCompleto.toUpperCase()}</div>
                <!-- CI -->
                <div class="carnet-ci" style="text-align: center;">CI: ${ci}</div>
                <!-- QR centrado -->
                <div id="carnetQRAdmin" style="display: flex; justify-content: center; margin: 15px auto;"></div>
                <!-- ID numérico (para referencia) -->
                <div style="text-align: center; font-size: 0.7rem; margin-top: 5px; opacity: 0.8;">ID: ${id}</div>
                <!-- Pie de página -->
                <div class="carnet-footer" style="margin-top: 10px; font-size: 0.9rem; text-align: center;">Caaguazú 2026</div>
            </div>
        `;
        const qrDiv = document.getElementById('carnetQRAdmin');
        qrDiv.innerHTML = '';
        new QRCode(qrDiv, {
            text: qrTexto,
            width: 120,
            height: 120,
            colorDark: "#0f3460",
            colorLight: "#ffffff"
        });
        document.getElementById('modalCarnetAdmin').classList.add('active');
    }
    
    function cerrarModalCarnetAdmin() {
        document.getElementById('modalCarnetAdmin').classList.remove('active');
    }
    
    function imprimirCarnet() {
        const carnetHTML = document.querySelector('#carnetAdminContent .carnet').cloneNode(true);
        const ventana = window.open('', '_blank');
        ventana.document.write(`
            <html><head><title>Carnet - Seminario USCA</title>
            <style>
                body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
                .carnet { background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%); color: white; padding: 1.5rem; border-radius: 16px; text-align: center; width: 400px; margin: auto; position: relative; }
                .carnet-header { display: flex; align-items: center; justify-content: center; gap: 10px; }
                .carnet-nombre { font-size: 1.3rem; font-weight: 800; margin: 0.5rem 0; }
                img { max-width: 100%; }
                #carnetQRAdmin { display: flex; justify-content: center; }
            </style>
            </head><body>
            ${carnetHTML.outerHTML}
            <script>window.onload = function() { window.print(); setTimeout(() => window.close(), 500); }<\/script>
            </body></html>
        `);
        ventana.document.close();
    }
    
    function descargarCarnetAdmin() {
        const carnetElement = document.querySelector('#carnetAdminContent .carnet');
        html2canvas(carnetElement, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'carnet.png';
            link.href = canvas.toDataURL();
            link.click();
        }).catch(() => alert('Error al generar la imagen'));
    }
    
    function eliminarInscrito(id, nombre) {
        if (confirm(`¿Estás seguro de que deseas eliminar a ${nombre}? Esta acción no se puede deshacer.`)) {
            const password = prompt("Para confirmar la eliminación, ingresa la contraseña de administrador:");
            if (password === "2000") {
                db.ref('inscritos/' + id).remove().then(() => {
                    alert("Inscrito eliminado correctamente.");
                    actualizarListaInscritos();
                }).catch(err => alert("Error al eliminar: " + err.message));
            } else {
                alert("Contraseña incorrecta. Eliminación cancelada.");
            }
        }
    }
    
    function actualizarListaInscritos() {
        const container = document.getElementById('listaInscritosContainer');
        if (!container) return;
        const termRaw = searchTerm.trim();
        let inscritosFiltrados = inscritos;
        if (termRaw !== '') {
            const termNormalizado = textoNormalizadoSinEspacios(termRaw);
            inscritosFiltrados = inscritos.filter(i => {
                const nombreCompleto = `${i.nombre} ${i.apellido}`;
                const nombreCompletoSinEspacios = textoNormalizadoSinEspacios(nombreCompleto);
                const ciSinEspacios = textoNormalizadoSinEspacios(i.ci.toString());
                return nombreCompletoSinEspacios.includes(termNormalizado) || ciSinEspacios.includes(termNormalizado);
            });
        }
        if (inscritosFiltrados.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-exclamation-triangle"></i> No se encontraron inscritos que coincidan con "<strong>${termRaw}</strong>"</div>`;
            return;
        }
        let html = '';
        inscritosFiltrados.forEach(i => {
            let nombreResaltado = resaltarPalabras(i.nombre, searchTerm);
            let apellidoResaltado = resaltarPalabras(i.apellido, searchTerm);
            let ciResaltado = resaltarPalabras(i.ci.toString(), searchTerm);
            const imgPreview = i.comprobante ? `<img src="${i.comprobante}" class="img-thumb" onclick="verImagen('${i.comprobante}')">` : 'Sin imagen';
            html += `<div class="list-item">
                <div class="inscrito-info">
                    <strong>${nombreResaltado} ${apellidoResaltado}</strong><br>
                    CI: ${ciResaltado} | ${i.correo}
                    <div style="margin-top:5px;">${imgPreview}</div>
                </div>
                <div class="inscrito-actions">
                    <button class="btn btn-sm ${i.pagoVerificado ? 'btn-warning' : 'btn-success'}" onclick="togglePago('${i.id}')">
                        ${i.pagoVerificado ? 'Quitar pago' : 'Validar pago'}
                    </button>
                    <button class="btn btn-sm ${i.presente ? 'btn-warning' : 'btn-success'}" onclick="toggleAsistencia('${i.id}')">
                        ${i.presente ? 'Quitar asistencia' : 'Marcar asistencia'}
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="eliminarInscrito('${i.id}', '${i.nombre} ${i.apellido}')">
                        <i class="fas fa-trash"></i> Eliminar
                    </button>
                    <button class="btn btn-sm" style="background:#0f3460;" onclick="mostrarCarnetAdmin('${i.nombre} ${i.apellido}', '${i.ci}', '${i.id}')">
                        <i class="fas fa-id-card"></i> Carnet
                    </button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }
    
    window.buscarInscritos = function() {
        const input = document.getElementById('searchInput');
        searchTerm = input ? input.value : '';
        actualizarListaInscritos();
    };
    window.limpiarBusqueda = function() {
        searchTerm = '';
        const input = document.getElementById('searchInput');
        if (input) input.value = '';
        actualizarListaInscritos();
    };
    
    // ==================== RENDERIZAR SECCIONES ====================
    function renderDashboard() {
        return `<div class="kpi-grid" id="kpiContainer"></div><div class="section-card"><div class="section-title"><i class="fas fa-info-circle"></i> Resumen del evento</div><p id="resumenEvento"></p><canvas id="chartInscritos" style="max-height:250px; margin-top:1rem;"></canvas></div>`;
    }
    function renderEvento() {
        return `<div class="section-card"><div class="section-title"><i class="fas fa-calendar-alt"></i> Configuración del Evento</div><div class="form-group"><label>Descripción</label><textarea id="descEvento" rows="3"></textarea></div><div class="form-group"><label>Fecha</label><input type="date" id="fechaEvento"></div><div class="form-group"><label>Hora inicio</label><input type="time" id="horaInicio"></div><div class="form-group"><label>Hora fin</label><input type="time" id="horaFin"></div><button class="btn" onclick="guardarEvento()">Guardar cambios</button></div>`;
    }
    function renderAgenda() {
        return `<div class="section-card"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;"><div class="section-title"><i class="fas fa-list-ul"></i> Agenda del Evento</div><button class="btn" onclick="exportarAgendaPDF()"><i class="fas fa-file-pdf"></i> Exportar agenda a PDF</button></div><div class="section-title"><i class="fas fa-plus-circle"></i> Agregar actividad</div><div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;"><input type="time" id="nuevaHora" style="flex:1;"><input type="text" id="nuevoTema" placeholder="Tema" style="flex:2;"><input type="text" id="nuevoSpeaker" placeholder="Expositor" style="flex:2;"><button class="btn" onclick="agregarActividad()">➕ Agregar</button></div><div class="section-title"><i class="fas fa-list"></i> Actividades actuales</div><div id="listaAgenda"></div></div>`;
    }
    function renderAuspiciantes() {
        return `<div class="section-card"><div class="section-title"><i class="fas fa-handshake"></i> Agregar auspiciante</div><div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;"><input type="text" id="nombreAuspiciante" placeholder="Nombre" style="flex:2;"><input type="file" id="imagenAuspiciante" accept="image/*" style="flex:2;"><button class="btn" onclick="agregarAuspiciante()">➕ Agregar</button></div><div class="section-title"><i class="fas fa-building"></i> Auspiciantes actuales</div><div id="listaAuspiciantes"></div></div>`;
    }
    function renderInscritos() {
        return `<div class="section-card"><div class="section-title"><i class="fas fa-users"></i> Lista de inscritos</div><div class="search-container"><input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar por nombre, apellido o cédula (ignora espacios)" onkeyup="buscarInscritos()"><button class="btn" onclick="buscarInscritos()"><i class="fas fa-search"></i> Buscar</button><button class="btn" style="background:#64748b;" onclick="limpiarBusqueda()"><i class="fas fa-times"></i> Limpiar</button><button class="btn" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Exportar</button></div><div id="listaInscritosContainer"></div></div>`;
    }
    function renderScanner() {
        return `<div class="section-card"><div class="section-title"><i class="fas fa-qrcode"></i> Escáner QR</div><p>Acerca el código QR del carnet para cambiar asistencia (toggle).</p><div class="scanner-container"><video id="scannerVideo" playsinline></video><div style="margin-top:1rem;"><button class="btn" id="btnIniciar" onclick="iniciarEscaner()"><i class="fas fa-video"></i> Iniciar cámara</button><button class="btn btn-danger" id="btnDetener" onclick="detenerEscaner()" style="display:none;"><i class="fas fa-stop"></i> Detener</button></div><div id="scannerResultado" style="margin-top:1rem;"></div></div></div>`;
    }
    
    function exportarAgendaPDF() {
        const fechaEvento = new Date(eventInfo.fecha).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        let tablaHTML = `<div class="pdf-agenda" style="font-family: 'Inter', sans-serif; padding: 20px;"><div style="text-align:center; margin-bottom:20px; border-bottom:2px solid #0f3460; padding-bottom:10px;"><img src="assets/logo.png" style="height:60px;"><h2 style="color:#0f3460;">III SEMINARIO DE ACTUALIZACIÓN QUIRÚRGICA</h2><p style="color:#e94560;">${fechaEvento} - ${eventInfo.horaInicio} a ${eventInfo.horaFin}</p></div><table style="width:100%; border-collapse:collapse;"><thead><tr style="background:#0f3460; color:white;"><th>Hora</th><th>Tema</th><th>Expositor</th></tr></thead><tbody>${agenda.map(item => `<tr><td style="border:1px solid #ddd; padding:8px;">${item.hora}</td><td style="border:1px solid #ddd; padding:8px;">${item.tema}</td><td style="border:1px solid #ddd; padding:8px;">${item.speaker || '---'}</td></table>`).join('')}</tbody></table><div style="text-align:center; margin-top:20px; font-size:0.8rem; color:#64748b;">Seminario USCA - ${fechaEvento}</div></div>`;
        const element = document.createElement('div');
        element.innerHTML = tablaHTML;
        document.body.appendChild(element);
        html2pdf().set({ margin: [0.5,0.5,0.5,0.5], filename: `agenda_seminario_${eventInfo.fecha}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save().then(() => element.remove());
    }
    window.exportarAgendaPDF = exportarAgendaPDF;
    
    // ==================== CRUD CON FIREBASE ====================
    window.guardarEvento = function() {
        eventInfo.descripcion = document.getElementById('descEvento').value;
        eventInfo.fecha = document.getElementById('fechaEvento').value;
        eventInfo.horaInicio = document.getElementById('horaInicio').value;
        eventInfo.horaFin = document.getElementById('horaFin').value;
        db.ref('evento').set(eventInfo).then(() => {
            alert("Evento actualizado");
            cambiarSeccion('dashboard');
        }).catch(err => alert("Error: " + err.message));
    };
    
    window.agregarActividad = function() {
        let hora = document.getElementById('nuevaHora').value, tema = document.getElementById('nuevoTema').value;
        if(!hora || !tema) { alert("Completa hora y tema"); return; }
        const speaker = document.getElementById('nuevoSpeaker').value;
        const newId = Date.now().toString();
        db.ref('agenda/' + newId).set({ id: newId, hora, tema, speaker }).then(() => {
            cambiarSeccion('agenda');
        }).catch(err => alert("Error: " + err.message));
    };
    
    window.eliminarActividad = function(id) {
        db.ref('agenda/' + id).remove().then(() => {
            cambiarSeccion('agenda');
        }).catch(err => alert("Error: " + err.message));
    };
    
    window.agregarAuspiciante = function() {
        let nombre = document.getElementById('nombreAuspiciante').value.trim();
        if(!nombre) { alert("Ingrese nombre"); return; }
        let file = document.getElementById('imagenAuspiciante').files[0];
        const newId = Date.now().toString();
        const reader = new FileReader();
        reader.onload = e => {
            db.ref('auspiciantes/' + newId).set({ id: newId, nombre, imagen: e.target.result }).then(() => {
                cambiarSeccion('auspiciantes');
            }).catch(err => alert("Error: " + err.message));
        };
        if(file) reader.readAsDataURL(file);
        else {
            db.ref('auspiciantes/' + newId).set({ id: newId, nombre, imagen: null }).then(() => {
                cambiarSeccion('auspiciantes');
            }).catch(err => alert("Error: " + err.message));
        }
        document.getElementById('nombreAuspiciante').value = '';
        document.getElementById('imagenAuspiciante').value = '';
    };
    
    window.eliminarAuspiciante = function(id) {
        db.ref('auspiciantes/' + id).remove().then(() => {
            cambiarSeccion('auspiciantes');
        }).catch(err => alert("Error: " + err.message));
    };
    
    window.togglePago = function(id) {
        const ref = db.ref('inscritos/' + id);
        ref.once('value').then(snap => {
            const inscrito = snap.val();
            if(inscrito) {
                inscrito.pagoVerificado = !inscrito.pagoVerificado;
                ref.set(inscrito);
            }
        });
    };
    
    window.toggleAsistencia = function(id) {
        const ref = db.ref('inscritos/' + id);
        ref.once('value').then(snap => {
            const inscrito = snap.val();
            if(inscrito) {
                inscrito.presente = !inscrito.presente;
                ref.set(inscrito);
            }
        });
    };
    
    window.verImagen = function(base64) {
        document.getElementById('imgGrande').src = base64;
        document.getElementById('modalImagen').classList.add('active');
    };
    window.cerrarModalImagen = function() {
        document.getElementById('modalImagen').classList.remove('active');
    };
    
    function exportarExcel() {
        let csv = "Nombre,Cédula,Email,Pago verificado,Asistencia\n";
        inscritos.forEach(i => {
            csv += `"${i.nombre} ${i.apellido}","${i.ci}","${i.correo}","${i.pagoVerificado ? 'Sí' : 'No'}","${i.presente ? 'Presente' : 'Ausente'}"\n`;
        });
        let blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "inscritos.csv";
        link.click();
        URL.revokeObjectURL(link.href);
    }
    window.exportarExcel = exportarExcel;
    
    // ==================== ESCÁNER QR ====================
    window.iniciarEscaner = function() {
        let video = document.getElementById('scannerVideo');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
            scannerStream = stream;
            video.srcObject = stream;
            video.play();
            document.getElementById('btnIniciar').style.display = 'none';
            document.getElementById('btnDetener').style.display = 'inline-block';
            scannerActive = true;
            escanearQR();
        }).catch(err => alert("Error cámara: " + err.message));
    };
    
    window.detenerEscaner = function() {
        scannerActive = false;
        if(scannerAnimation) cancelAnimationFrame(scannerAnimation);
        if(scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
        let video = document.getElementById('scannerVideo');
        if(video) video.srcObject = null;
        document.getElementById('btnIniciar').style.display = 'inline-block';
        document.getElementById('btnDetener').style.display = 'none';
    };
    
    function escanearQR() {
        if(!scannerActive) return;
        let video = document.getElementById('scannerVideo');
        if(video.videoWidth === 0) { scannerAnimation = requestAnimationFrame(escanearQR); return; }
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let code = jsQR(imageData.data, canvas.width, canvas.height);
        if(code) {
            let qrText = code.data;
            let id = null;
            // Buscar ID en el texto (formato "ID: xxx" o simplemente el número si es solo el ID)
            let match = qrText.match(/ID:\s*(\d+)/i);
            if (match) {
                id = match[1];
            } else if (/^\d+$/.test(qrText)) {
                id = qrText;
            }
            let inscrito = inscritos.find(i => i.id === id);
            let resultadoDiv = document.getElementById('scannerResultado');
            if(inscrito) {
                inscrito.presente = !inscrito.presente;
                db.ref('inscritos/' + inscrito.id).set(inscrito).then(() => {
                    resultadoDiv.innerHTML = `<span style="color:green;">✅ Asistencia cambiada a ${inscrito.presente ? 'Presente' : 'Ausente'} para ${inscrito.nombre}</span>`;
                    setTimeout(() => resultadoDiv.innerHTML = '', 3000);
                    detenerEscaner();
                    if(document.getElementById('listaInscritosContainer')) actualizarListaInscritos();
                });
            } else {
                resultadoDiv.innerHTML = `<span style="color:red;">❌ Código no válido</span>`;
                setTimeout(() => resultadoDiv.innerHTML = '', 2000);
            }
            return;
        }
        scannerAnimation = requestAnimationFrame(escanearQR);
    }
    
    // ==================== NAVEGACIÓN ====================
    function cambiarSeccion(seccion) {
        let content = document.getElementById('mainContent');
        if(seccion === 'dashboard') {
            content.innerHTML = renderDashboard();
            setTimeout(() => actualizarDashboard(), 50);
        } else if(seccion === 'evento') {
            content.innerHTML = renderEvento();
            cargarEventoAlFormulario();
        } else if(seccion === 'agenda') {
            content.innerHTML = renderAgenda();
            actualizarListaAgenda();
        } else if(seccion === 'auspiciantes') {
            content.innerHTML = renderAuspiciantes();
            actualizarListaAuspiciantes();
        } else if(seccion === 'inscritos') {
            content.innerHTML = renderInscritos();
            actualizarListaInscritos();
        } else if(seccion === 'scanner') {
            content.innerHTML = renderScanner();
        }
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${seccion}"]`).classList.add('active');
        if(seccion !== 'scanner') detenerEscaner();
    }
    
    // ==================== LOGIN / LOGOUT ====================
    window.verificarLogin = function() {
        const pass = document.getElementById('adminPassword').value;
        if(pass === 'usca2026') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            cargarDatos();
            cambiarSeccion('dashboard');
        } else {
            document.getElementById('loginError').innerText = '❌ Contraseña incorrecta';
        }
    };
    
    window.cerrarSesion = function() {
        detenerEscaner();
        document.getElementById('adminPanel').classList.remove('active');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerText = '';
    };
    
    window.cambiarSeccion = cambiarSeccion;
    window.cerrarModalCarnetAdmin = cerrarModalCarnetAdmin;
    window.imprimirCarnet = imprimirCarnet;
    window.descargarCarnetAdmin = descargarCarnetAdmin;
    window.mostrarCarnetAdmin = mostrarCarnetAdmin;
    window.eliminarInscrito = eliminarInscrito;
    
    document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => cambiarSeccion(el.getAttribute('data-tab')));
    });
</script>
