<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Administrador - Seminario USCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <i class="fas fa-lock" style="font-size: 3rem; color:#0f3460;"></i>
        <h2>Acceso Administrador</h2>
        <input type="password" id="adminPassword" placeholder="Contraseña" onkeypress="if(event.key==='Enter') verificarLogin()">
        <button onclick="verificarLogin()">Ingresar</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <div class="logo-area">
            <img src="assets/logo.png" alt="Logo">
            <h1>ADMINISTRADOR</h1>
        </div>
        <div class="user-area">
            <span class="user-email"><i class="fas fa-envelope"></i> admin@usca.com</span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></div>
            <div class="nav-item" data-tab="evento"><i class="fas fa-calendar-alt"></i> <span>Evento</span></div>
            <div class="nav-item" data-tab="agenda"><i class="fas fa-list-ul"></i> <span>Agenda</span></div>
            <div class="nav-item" data-tab="auspiciantes"><i class="fas fa-handshake"></i> <span>Auspiciantes</span></div>
            <div class="nav-item" data-tab="inscritos"><i class="fas fa-users"></i> <span>Inscritos</span></div>
            <div class="nav-item" data-tab="scanner"><i class="fas fa-qrcode"></i> <span>Escáner QR</span></div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </div>
</div>

<div id="modalImagen" class="modal-imagen" onclick="cerrarModalImagen()"><img id="imgGrande" src=""></div>

<script>
    // ==================== DATOS (LOCALSTORAGE) ====================
    let agenda = [], auspiciantes = [], inscritos = [], eventInfo = {};
    let scannerActive = false, scannerStream = null, scannerAnimation = null;
    let searchTerm = '';

    function cargarDatos() {
        agenda = JSON.parse(localStorage.getItem('agenda_items') || '[{"id":"1","hora":"08:00","tema":"Bienvenida","speaker":"Director"},{"id":"2","hora":"09:00","tema":"Laparoscopia","speaker":"Dr. García"},{"id":"3","hora":"10:30","tema":"Receso","speaker":""},{"id":"4","hora":"11:00","tema":"Protocolos Quirúrgicos Modernos","speaker":"Dra. López"},{"id":"5","hora":"12:30","tema":"Almuerzo","speaker":""},{"id":"6","hora":"14:00","tema":"Panel de Especialistas","speaker":"Equipo Médico"},{"id":"7","hora":"15:30","tema":"Taller Práctico","speaker":"Profesor Torres"},{"id":"8","hora":"17:00","tema":"Clausura","speaker":"Director USCA"}]');
        auspiciantes = JSON.parse(localStorage.getItem('auspiciantes_items') || '[]');
        inscritos = JSON.parse(localStorage.getItem('inscritos_items') || '[]');
        eventInfo = JSON.parse(localStorage.getItem('evento_info') || '{"descripcion":"Evento de actualización quirúrgica","fecha":"2026-08-08","horaInicio":"08:00","horaFin":"17:00"}');
    }
    function guardarDatos() {
        localStorage.setItem('agenda_items', JSON.stringify(agenda));
        localStorage.setItem('auspiciantes_items', JSON.stringify(auspiciantes));
        localStorage.setItem('inscritos_items', JSON.stringify(inscritos));
        localStorage.setItem('evento_info', JSON.stringify(eventInfo));
    }

    // ==================== TOGGLES ====================
    window.togglePago = function(id) {
        let idx = inscritos.findIndex(i => i.id === id);
        if(idx !== -1) { inscritos[idx].pagoVerificado = !inscritos[idx].pagoVerificado; guardarDatos(); cambiarSeccion('inscritos'); }
    };
    window.toggleAsistencia = function(id) {
        let idx = inscritos.findIndex(i => i.id === id);
        if(idx !== -1) { inscritos[idx].presente = !inscritos[idx].presente; guardarDatos(); cambiarSeccion('inscritos'); }
    };

    // ==================== RENDERIZADO DE SECCIONES ====================
    function renderDashboard() {
        const total = inscritos.length, pagos = inscritos.filter(i=>i.pagoVerificado).length, presentes = inscritos.filter(i=>i.presente).length;
        return `
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-info"><h3>Inscritos</h3><div class="kpi-number">${total}</div></div><div class="kpi-icon"><i class="fas fa-users"></i></div></div>
                <div class="kpi-card"><div class="kpi-info"><h3>Pagos verificados</h3><div class="kpi-number">${pagos}</div></div><div class="kpi-icon"><i class="fas fa-credit-card"></i></div></div>
                <div class="kpi-card"><div class="kpi-info"><h3>Asistencia confirmada</h3><div class="kpi-number">${presentes}</div></div><div class="kpi-icon"><i class="fas fa-check-circle"></i></div></div>
                <div class="kpi-card"><div class="kpi-info"><h3>Actividades</h3><div class="kpi-number">${agenda.length}</div></div><div class="kpi-icon"><i class="fas fa-calendar"></i></div></div>
            </div>
            <div class="section-card">
                <div class="section-title"><i class="fas fa-info-circle"></i> Resumen del evento</div>
                <p>📅 ${new Date(eventInfo.fecha).toLocaleDateString('es-ES')} - ${eventInfo.horaInicio} a ${eventInfo.horaFin}</p>
                <canvas id="chartInscritos" style="max-height:250px; margin-top:1rem;"></canvas>
            </div>
        `;
    }

    function renderEvento() {
        return `<div class="section-card">
            <div class="section-title"><i class="fas fa-calendar-alt"></i> Configuración del Evento</div>
            <div class="form-group"><label>Descripción</label><textarea id="descEvento" rows="3">${eventInfo.descripcion}</textarea></div>
            <div class="form-group"><label>Fecha</label><input type="date" id="fechaEvento" value="${eventInfo.fecha}"></div>
            <div class="form-group"><label>Hora inicio</label><input type="time" id="horaInicio" value="${eventInfo.horaInicio}"></div>
            <div class="form-group"><label>Hora fin</label><input type="time" id="horaFin" value="${eventInfo.horaFin}"></div>
            <button class="btn" onclick="guardarEvento()">Guardar cambios</button>
        </div>`;
    }

    function exportarAgendaPDF() {
        const fechaEvento = new Date(eventInfo.fecha).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        let tablaHTML = `
            <div style="font-family: 'Inter', sans-serif; padding: 20px;">
                <div style="text-align:center; margin-bottom:20px; border-bottom:2px solid #0f3460; padding-bottom:10px;">
                    <img src="assets/logo.png" style="height:60px;"><h2 style="color:#0f3460;">III SEMINARIO DE ACTUALIZACIÓN QUIRÚRGICA</h2>
                    <p style="color:#e94560;">${fechaEvento} - ${eventInfo.horaInicio} a ${eventInfo.horaFin}</p>
                </div>
                <table style="width:100%; border-collapse:collapse;">
                    <thead><tr style="background:#0f3460; color:white;"><th>Hora</th><th>Tema</th><th>Expositor</th></tr></thead>
                    <tbody>${agenda.map(item => `<tr><td style="border:1px solid #ddd; padding:8px;">${item.hora}</td><td style="border:1px solid #ddd; padding:8px;">${item.tema}</td><td style="border:1px solid #ddd; padding:8px;">${item.speaker || '---'}</td></tr>`).join('')}</tbody>
                </table>
                <div style="text-align:center; margin-top:20px; font-size:0.8rem; color:#64748b;">Seminario USCA - ${fechaEvento}</div>
            </div>
        `;
        const element = document.createElement('div');
        element.innerHTML = tablaHTML;
        document.body.appendChild(element);
        html2pdf().set({ margin: [0.5,0.5,0.5,0.5], filename: `agenda_seminario_${eventInfo.fecha}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save().then(() => element.remove());
    }

    function renderAgenda() {
        let html = `<div class="section-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <div class="section-title"><i class="fas fa-list-ul"></i> Agenda del Evento</div>
                <button class="btn" onclick="exportarAgendaPDF()"><i class="fas fa-file-pdf"></i> Exportar agenda a PDF</button>
            </div>
            <div class="section-title"><i class="fas fa-plus-circle"></i> Agregar actividad</div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;">
                <input type="time" id="nuevaHora" style="flex:1;">
                <input type="text" id="nuevoTema" placeholder="Tema" style="flex:2;">
                <input type="text" id="nuevoSpeaker" placeholder="Expositor" style="flex:2;">
                <button class="btn" onclick="agregarActividad()">➕ Agregar</button>
            </div>
            <div class="section-title"><i class="fas fa-list"></i> Actividades actuales</div>
            <div id="listaAgenda">`;
        agenda.forEach(a => {
            html += `<div class="list-item"><div><strong>${a.hora}</strong> - ${a.tema}<br><small>${a.speaker||''}</small></div><button class="btn btn-sm btn-danger" onclick="eliminarActividad('${a.id}')">Eliminar</button></div>`;
        });
        html += `</div></div>`;
        return html;
    }

    function renderAuspiciantes() {
        let html = `<div class="section-card">
            <div class="section-title"><i class="fas fa-handshake"></i> Agregar auspiciante</div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;">
                <input type="text" id="nombreAuspiciante" placeholder="Nombre" style="flex:2;">
                <input type="file" id="imagenAuspiciante" accept="image/*" style="flex:2;">
                <button class="btn" onclick="agregarAuspiciante()">➕ Agregar</button>
            </div>
            <div class="section-title"><i class="fas fa-building"></i> Auspiciantes actuales</div>
            <div id="listaAuspiciantes">`;
        auspiciantes.forEach(a => {
            html += `<div class="list-item"><div style="display:flex; align-items:center; gap:10px;">${a.imagen ? `<img src="${a.imagen}" style="height:40px; border-radius:8px;">` : '<i class="fas fa-building" style="font-size:1.8rem;"></i>'}<strong>${a.nombre}</strong></div><button class="btn btn-sm btn-danger" onclick="eliminarAuspiciante('${a.id}')">Eliminar</button></div>`;
        });
        html += `</div></div>`;
        return html;
    }

    function actualizarListaInscritos() {
        const container = document.getElementById('listaInscritosContainer');
        if (!container) return;
        const term = searchTerm.trim().toLowerCase();
        let filtrados = inscritos;
        if (term !== '') {
            filtrados = inscritos.filter(i => i.nombre.toLowerCase().includes(term) || i.apellido.toLowerCase().includes(term) || i.ci.toString().includes(term));
        }
        if (filtrados.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-exclamation-triangle"></i> No se encontraron inscritos que coincidan con "<strong>${searchTerm}</strong>"</div>`;
            return;
        }
        let html = '';
        filtrados.forEach(i => {
            const imgPreview = i.comprobante ? `<img src="${i.comprobante}" class="img-thumb" onclick="verImagen('${i.comprobante}')">` : 'Sin imagen';
            html += `<div class="list-item">
                <div class="inscrito-info">
                    <strong>${i.nombre} ${i.apellido}</strong><br>CI: ${i.ci} | ${i.correo}
                    <div style="margin-top:5px;">${imgPreview}</div>
                </div>
                <div class="inscrito-actions">
                    <button class="btn btn-sm ${i.pagoVerificado ? 'btn-warning' : 'btn-success'}" onclick="togglePago('${i.id}')">${i.pagoVerificado ? 'Quitar pago' : 'Validar pago'}</button>
                    <button class="btn btn-sm ${i.presente ? 'btn-warning' : 'btn-success'}" onclick="toggleAsistencia('${i.id}')">${i.presente ? 'Quitar asistencia' : 'Marcar asistencia'}</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderInscritos() {
        return `<div class="section-card">
            <div class="section-title"><i class="fas fa-users"></i> Lista de inscritos</div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar por nombre, apellido o cédula" onkeyup="buscarInscritos()" value="${searchTerm}">
                <button class="btn" onclick="buscarInscritos()"><i class="fas fa-search"></i> Buscar</button>
                <button class="btn" style="background:#64748b;" onclick="limpiarBusqueda()"><i class="fas fa-times"></i> Limpiar</button>
                <button class="btn" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Exportar</button>
            </div>
            <div id="listaInscritosContainer"></div>
        </div>`;
    }

    function renderScanner() {
        return `<div class="section-card">
            <div class="section-title"><i class="fas fa-qrcode"></i> Escáner QR</div>
            <p>Acerca el código QR del carnet para cambiar asistencia (toggle).</p>
            <div class="scanner-container">
                <video id="scannerVideo" playsinline></video>
                <div style="margin-top:1rem;">
                    <button class="btn" id="btnIniciar" onclick="iniciarEscaner()"><i class="fas fa-video"></i> Iniciar cámara</button>
                    <button class="btn btn-danger" id="btnDetener" onclick="detenerEscaner()" style="display:none;"><i class="fas fa-stop"></i> Detener</button>
                </div>
                <div id="scannerResultado" style="margin-top:1rem;"></div>
            </div>
        </div>`;
    }

    // ==================== CRUD ====================
    window.guardarEvento = function() {
        eventInfo.descripcion = document.getElementById('descEvento').value;
        eventInfo.fecha = document.getElementById('fechaEvento').value;
        eventInfo.horaInicio = document.getElementById('horaInicio').value;
        eventInfo.horaFin = document.getElementById('horaFin').value;
        guardarDatos();
        alert("Evento actualizado");
        cambiarSeccion('dashboard');
    };
    window.agregarActividad = function() {
        let hora = document.getElementById('nuevaHora').value, tema = document.getElementById('nuevoTema').value;
        if(!hora || !tema) { alert("Completa hora y tema"); return; }
        agenda.push({ id: Date.now().toString(), hora, tema, speaker: document.getElementById('nuevoSpeaker').value });
        guardarDatos();
        cambiarSeccion('agenda');
    };
    window.eliminarActividad = function(id) {
        agenda = agenda.filter(a => a.id !== id);
        guardarDatos();
        cambiarSeccion('agenda');
    };
    window.agregarAuspiciante = function() {
        let nombre = document.getElementById('nombreAuspiciante').value.trim();
        if(!nombre) { alert("Ingrese nombre"); return; }
        let file = document.getElementById('imagenAuspiciante').files[0];
        let reader = new FileReader();
        reader.onload = e => {
            auspiciantes.push({ id: Date.now().toString(), nombre, imagen: e.target.result });
            guardarDatos();
            cambiarSeccion('auspiciantes');
        };
        if(file) reader.readAsDataURL(file);
        else { auspiciantes.push({ id: Date.now().toString(), nombre, imagen: null }); guardarDatos(); cambiarSeccion('auspiciantes'); }
        document.getElementById('nombreAuspiciante').value = '';
        document.getElementById('imagenAuspiciante').value = '';
    };
    window.eliminarAuspiciante = function(id) {
        auspiciantes = auspiciantes.filter(a => a.id !== id);
        guardarDatos();
        cambiarSeccion('auspiciantes');
    };
    window.exportarExcel = function() {
        let csv = "Nombre,Cédula,Email,Pago verificado,Asistencia\n";
        inscritos.forEach(i => {
            csv += `"${i.nombre} ${i.apellido}","${i.ci}","${i.correo}","${i.pagoVerificado ? 'Sí' : 'No'}","${i.presente ? 'Presente' : 'Ausente'}"\n`;
        });
        let blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "inscritos.csv";
        link.click();
        URL.revokeObjectURL(link.href);
    };
    window.verImagen = function(base64) { document.getElementById('imgGrande').src = base64; document.getElementById('modalImagen').classList.add('active'); };
    window.cerrarModalImagen = function() { document.getElementById('modalImagen').classList.remove('active'); };

    // ==================== ESCÁNER QR ====================
    window.iniciarEscaner = function() {
        let video = document.getElementById('scannerVideo');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
            scannerStream = stream; video.srcObject = stream; video.play();
            document.getElementById('btnIniciar').style.display = 'none';
            document.getElementById('btnDetener').style.display = 'inline-block';
            scannerActive = true;
            escanearQR();
        }).catch(err => alert("Error cámara: " + err.message));
    };
    window.detenerEscaner = function() {
        scannerActive = false;
        if(scannerAnimation) cancelAnimationFrame(scannerAnimation);
        if(scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
        let video = document.getElementById('scannerVideo');
        if(video) video.srcObject = null;
        document.getElementById('btnIniciar').style.display = 'inline-block';
        document.getElementById('btnDetener').style.display = 'none';
    };
    function escanearQR() {
        if(!scannerActive) return;
        let video = document.getElementById('scannerVideo');
        if(video.videoWidth === 0) { scannerAnimation = requestAnimationFrame(escanearQR); return; }
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let code = jsQR(imageData.data, canvas.width, canvas.height);
        if(code) {
            let inscrito = inscritos.find(i => i.id === code.data);
            let resultadoDiv = document.getElementById('scannerResultado');
            if(inscrito) {
                inscrito.presente = !inscrito.presente;
                guardarDatos();
                resultadoDiv.innerHTML = `<span style="color:green;">✅ Asistencia cambiada a ${inscrito.presente ? 'Presente' : 'Ausente'} para ${inscrito.nombre}</span>`;
                setTimeout(() => resultadoDiv.innerHTML = '', 3000);
                detenerEscaner();
                if(document.querySelector('.nav-item[data-tab="inscritos"]').classList.contains('active')) actualizarListaInscritos();
            } else {
                resultadoDiv.innerHTML = `<span style="color:red;">❌ Código no válido</span>`;
                setTimeout(() => resultadoDiv.innerHTML = '', 2000);
            }
            return;
        }
        scannerAnimation = requestAnimationFrame(escanearQR);
    }

    // ==================== NAVEGACIÓN ====================
    window.buscarInscritos = function() {
        const input = document.getElementById('searchInput');
        searchTerm = input ? input.value : '';
        actualizarListaInscritos();
    };
    window.limpiarBusqueda = function() {
        searchTerm = '';
        const input = document.getElementById('searchInput');
        if (input) input.value = '';
        actualizarListaInscritos();
    };

    function cambiarSeccion(seccion) {
        let content = document.getElementById('mainContent');
        if(seccion === 'dashboard') {
            content.innerHTML = renderDashboard();
            setTimeout(() => {
                let ctx = document.getElementById('chartInscritos')?.getContext('2d');
                if(ctx) {
                    let presentes = inscritos.filter(i=>i.presente).length;
                    new Chart(ctx, { type: 'doughnut', data: { labels: ['Confirmados', 'Pendientes'], datasets: [{ data: [presentes, inscritos.length - presentes], backgroundColor: ['#16c784', '#e94560'] }] } });
                }
            }, 50);
        } else if(seccion === 'evento') content.innerHTML = renderEvento();
        else if(seccion === 'agenda') content.innerHTML = renderAgenda();
        else if(seccion === 'auspiciantes') content.innerHTML = renderAuspiciantes();
        else if(seccion === 'inscritos') {
            content.innerHTML = renderInscritos();
            actualizarListaInscritos();
        }
        else if(seccion === 'scanner') content.innerHTML = renderScanner();
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${seccion}"]`).classList.add('active');
        if(seccion !== 'scanner') detenerEscaner();
    }

    // ==================== LOGIN ====================
    window.verificarLogin = function() {
        let pass = document.getElementById('adminPassword').value;
        if(pass === 'usca2026') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            cargarDatos();
            cambiarSeccion('dashboard');
        } else {
            document.getElementById('loginError').innerText = '❌ Contraseña incorrecta';
        }
    };
    window.cerrarSesion = function() {
        detenerEscaner();
        document.getElementById('adminPanel').classList.remove('active');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerText = '';
    };

    // Eventos del sidebar
    document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => cambiarSeccion(el.getAttribute('data-tab')));
    });
</script>
</body>
</html>
