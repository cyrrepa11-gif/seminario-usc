<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Administrador - Seminario USCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Estilos responsive (los mismos que antes, pero añadimos soporte para tabs de días) */
        .dias-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }
        .dia-tab {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .dia-tab.active {
            background: #0f3460;
            color: white;
        }
        .form-agregar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .form-agregar input, .form-agregar select {
            flex: 1;
            min-width: 120px;
        }
        @media (max-width: 768px) {
            .form-agregar {
                flex-direction: column;
            }
            .form-agregar input, .form-agregar select, .form-agregar button {
                width: 100%;
            }
            .dias-tabs {
                justify-content: center;
            }
        }
        /* Resto de estilos se mantienen */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%);
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            color: #0f3460;
            font-family: 'Playfair Display', serif;
        }
        .login-card input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
        }
        .login-card button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-msg {
            color: #e94560;
            margin-top: 0.5rem;
        }
        .admin-panel {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .admin-panel.active {
            display: flex;
        }
        .admin-header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo-area img {
            height: 50px;
        }
        .logo-area h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f3460;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn-logout {
            background: #e94560;
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .admin-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 1rem 0;
            overflow-y: auto;
        }
        .nav-item {
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
            color: #475569;
            font-weight: 500;
            margin: 0.2rem 0.5rem;
            border-radius: 10px;
        }
        .nav-item.active {
            background: #0f3460;
            color: white;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f1f5f9;
        }
        /* Resto de estilos (kpi, listas, etc.) se mantienen */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .kpi-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f3460;
        }
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #0f3460;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-group {
            margin-bottom: 0.8rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
        }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-sm {
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }
        .btn-danger {
            background: #dc2626;
        }
        .list-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-left: 4px solid #e94560;
        }
        .img-thumb {
            width: 30px;
            height: 30px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
        }
        .highlight {
            background-color: #fef08a;
        }
        .search-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        #scannerVideo {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
        }
        .modal-imagen, .modal-carnet-admin {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-imagen.active, .modal-carnet-admin.active {
            display: flex;
        }
        .carnet-preview {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        .carnet {
            background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%);
            color: white;
            border-radius: 16px;
            padding: 1.5rem;
        }
        .close-carnet-x {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 24px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            .admin-layout {
                flex-direction: column;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .search-container {
                flex-direction: column;
            }
            .list-item {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<!-- Pantalla de login -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <i class="fas fa-lock" style="font-size: 3rem; color:#0f3460;"></i>
        <h2>Acceso Administrador</h2>
        <input type="password" id="adminPassword" placeholder="Contraseña" onkeypress="if(event.key==='Enter') verificarLogin()">
        <button onclick="verificarLogin()">Ingresar</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- Panel Admin -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <div class="logo-area">
            <img src="assets/logo.png" alt="Logo">
            <h1>ADMINISTRADOR</h1>
        </div>
        <div class="user-area">
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-item" data-tab="evento"><i class="fas fa-calendar-alt"></i> Evento</div>
            <div class="nav-item" data-tab="agenda"><i class="fas fa-list-ul"></i> Agenda</div>
            <div class="nav-item" data-tab="auspiciantes"><i class="fas fa-handshake"></i> Auspiciantes</div>
            <div class="nav-item" data-tab="inscritos"><i class="fas fa-users"></i> Inscritos</div>
            <div class="nav-item" data-tab="scanner"><i class="fas fa-qrcode"></i> Escáner QR</div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </div>
</div>

<!-- Modal para ver imagen -->
<div id="modalImagen" class="modal-imagen" onclick="cerrarModalImagen()"><img id="imgGrande" src=""></div>

<!-- Modal carnet -->
<div id="modalCarnetAdmin" class="modal-carnet-admin">
    <div class="carnet-preview">
        <span class="close-carnet-x" onclick="cerrarModalCarnetAdmin()">&times;</span>
        <div id="carnetAdminContent"></div>
        <button class="btn" onclick="descargarCarnetAdmin()">Descargar PNG</button>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDCMQjh5PCz2f17xxhMF0JkGAjliCBreUg",
        authDomain: "seminario-usca.firebaseapp.com",
        databaseURL: "https://seminario-usca-default-rtdb.firebaseio.com",
        projectId: "seminario-usca",
        storageBucket: "seminario-usca.firebasestorage.app",
        messagingSenderId: "560733409147",
        appId: "1:560733409147:web:13f01f10f3ee961ab677de"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ==================== VARIABLES GLOBALES ====================
    let agenda = [];        // cada elemento: { id, dia, hora, tema, speaker }
    let auspiciantes = [];
    let inscritos = [];
    let eventInfo = { 
        descripcion: "", 
        fechaInicio: "", 
        fechaFin: "", 
        horaInicio: "08:00", 
        horaFin: "17:00",
        ubicacion: "USCA"
    };
    let scannerActive = false, scannerStream = null, scannerAnimation = null;
    let searchTerm = '';
    let currentDia = 1;     // 1 o 2 para la agenda
    
    // ==================== SESIÓN ====================
    function checkSession() {
        if (sessionStorage.getItem('adminLogged') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            cargarDatos();
            cambiarSeccion('dashboard');
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').classList.remove('active');
        }
    }
    
    // ==================== CARGA DE DATOS ====================
    function cargarDatos() {
        db.ref('agenda').on('value', snap => {
            const data = snap.val();
            agenda = data ? Object.values(data) : [];
            if (document.getElementById('listaAgenda')) actualizarListaAgenda();
            if (document.getElementById('chartInscritos')) actualizarDashboard();
        });
        db.ref('auspiciantes').on('value', snap => {
            const data = snap.val();
            auspiciantes = data ? Object.values(data) : [];
            if (document.getElementById('listaAuspiciantes')) actualizarListaAuspiciantes();
        });
        db.ref('inscritos').on('value', snap => {
            const data = snap.val();
            inscritos = data ? Object.values(data) : [];
            if (document.getElementById('listaInscritosContainer')) actualizarListaInscritos();
            if (document.getElementById('chartInscritos')) actualizarDashboard();
        });
        db.ref('evento').on('value', snap => {
            if (snap.val()) eventInfo = snap.val();
            else {
                eventInfo = {
                    descripcion: "El III Seminario de Actualización Quirúrgica es un evento de formación...",
                    fechaInicio: "2026-08-08",
                    fechaFin: "2026-08-09",
                    horaInicio: "08:00",
                    horaFin: "17:00",
                    ubicacion: "USCA - Caaguazú"
                };
                db.ref('evento').set(eventInfo);
            }
            if (document.getElementById('descEvento')) cargarEventoAlFormulario();
            if (document.getElementById('chartInscritos')) actualizarDashboard();
        });
    }
    
    // ==================== VISTA DASHBOARD ====================
    function actualizarDashboard() {
        const total = inscritos.length;
        const pagos = inscritos.filter(i=>i.pagoVerificado).length;
        const presentes = inscritos.filter(i=>i.presente).length;
        document.getElementById('kpiContainer').innerHTML = `
            <div class="kpi-card"><div><div class="kpi-number">${total}</div><div>Inscritos</div></div><i class="fas fa-users"></i></div>
            <div class="kpi-card"><div><div class="kpi-number">${pagos}</div><div>Pagos OK</div></div><i class="fas fa-credit-card"></i></div>
            <div class="kpi-card"><div><div class="kpi-number">${presentes}</div><div>Asistencia</div></div><i class="fas fa-check-circle"></i></div>
            <div class="kpi-card"><div><div class="kpi-number">${agenda.length}</div><div>Actividades</div></div><i class="fas fa-calendar"></i></div>
        `;
        document.getElementById('resumenEvento').innerHTML = `📅 ${new Date(eventInfo.fechaInicio).toLocaleDateString('es-ES')} - ${new Date(eventInfo.fechaFin).toLocaleDateString('es-ES')} | ${eventInfo.horaInicio} a ${eventInfo.horaFin}<br>📍 ${eventInfo.ubicacion}`;
        const ctx = document.getElementById('chartInscritos')?.getContext('2d');
        if(ctx) new Chart(ctx, { type: 'doughnut', data: { labels: ['Confirmados','Pendientes'], datasets: [{ data: [presentes, total-presentes], backgroundColor: ['#16c784','#e94560'] }] } });
    }
    
    function cargarEventoAlFormulario() {
        document.getElementById('descEvento').value = eventInfo.descripcion;
        document.getElementById('fechaInicio').value = eventInfo.fechaInicio;
        document.getElementById('fechaFin').value = eventInfo.fechaFin;
        document.getElementById('horaInicio').value = eventInfo.horaInicio;
        document.getElementById('horaFin').value = eventInfo.horaFin;
        document.getElementById('ubicacion').value = eventInfo.ubicacion || "USCA";
    }
    
    function guardarEvento() {
        eventInfo.descripcion = document.getElementById('descEvento').value;
        eventInfo.fechaInicio = document.getElementById('fechaInicio').value;
        eventInfo.fechaFin = document.getElementById('fechaFin').value;
        eventInfo.horaInicio = document.getElementById('horaInicio').value;
        eventInfo.horaFin = document.getElementById('horaFin').value;
        eventInfo.ubicacion = document.getElementById('ubicacion').value;
        db.ref('evento').set(eventInfo).then(() => alert("Evento actualizado")).catch(e => alert("Error: "+e.message));
        cambiarSeccion('dashboard');
    }
    
    // ==================== AGENDA CON DÍAS Y ORDEN ====================
    function actualizarListaAgenda() {
        const container = document.getElementById('listaAgenda');
        const agendaDia = agenda.filter(item => item.dia == currentDia).sort((a,b) => a.hora.localeCompare(b.hora));
        if (agendaDia.length === 0) {
            container.innerHTML = '<p>No hay actividades para este día.</p>';
            return;
        }
        container.innerHTML = agendaDia.map(a => `
            <div class="list-item">
                <div><strong>${a.hora}</strong> - ${a.tema}<br><small>${a.speaker || ''}</small></div>
                <button class="btn btn-sm btn-danger" onclick="eliminarActividad('${a.id}')">Eliminar</button>
            </div>
        `).join('');
    }
    
    function agregarActividad() {
        let hora = document.getElementById('nuevaHora').value;
        let tema = document.getElementById('nuevoTema').value.trim();
        let speaker = document.getElementById('nuevoSpeaker').value.trim();
        if (!hora || !tema) { alert("Completa hora y tema"); return; }
        const newId = Date.now().toString();
        const nuevaActividad = { id: newId, dia: currentDia, hora, tema, speaker };
        // Guardar en Firebase
        db.ref('agenda/' + newId).set(nuevaActividad).then(() => {
            // Limpiar campos
            document.getElementById('nuevaHora').value = '';
            document.getElementById('nuevoTema').value = '';
            document.getElementById('nuevoSpeaker').value = '';
            cambiarSeccion('agenda'); // refresca
        }).catch(err => alert("Error: " + err.message));
    }
    
    function eliminarActividad(id) {
        if (confirm("¿Eliminar esta actividad?")) {
            db.ref('agenda/' + id).remove().then(() => cambiarSeccion('agenda'));
        }
    }
    
    function cambiarDia(dia) {
        currentDia = dia;
        document.querySelectorAll('.dia-tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`tabDia${dia}`).classList.add('active');
        actualizarListaAgenda();
    }
    
    // ==================== AUSPICIANTES ====================
    function actualizarListaAuspiciantes() {
        const container = document.getElementById('listaAuspiciantes');
        container.innerHTML = auspiciantes.map(a => `
            <div class="list-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    ${a.imagen ? `<img src="${a.imagen}" style="height:40px;">` : '<i class="fas fa-building"></i>'}
                    <strong>${a.nombre}</strong>
                </div>
                <button class="btn btn-sm btn-danger" onclick="eliminarAuspiciante('${a.id}')">Eliminar</button>
            </div>
        `).join('');
    }
    
    function agregarAuspiciante() {
        let nombre = document.getElementById('nombreAuspiciante').value.trim();
        if (!nombre) { alert("Ingrese nombre"); return; }
        const file = document.getElementById('imagenAuspiciante').files[0];
        const newId = Date.now().toString();
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                db.ref('auspiciantes/' + newId).set({ id: newId, nombre, imagen: e.target.result }).then(() => cambiarSeccion('auspiciantes'));
            };
            reader.readAsDataURL(file);
        } else {
            db.ref('auspiciantes/' + newId).set({ id: newId, nombre, imagen: null }).then(() => cambiarSeccion('auspiciantes'));
        }
        document.getElementById('nombreAuspiciante').value = '';
        document.getElementById('imagenAuspiciante').value = '';
    }
    
    function eliminarAuspiciante(id) {
        if (confirm("¿Eliminar auspiciante?")) db.ref('auspiciantes/' + id).remove().then(() => cambiarSeccion('auspiciantes'));
    }
    
    // ==================== INSCRITOS ====================
    function resaltarPalabras(texto, busqueda) {
        if (!busqueda.trim()) return texto;
        const palabras = busqueda.trim().split(/\s+/);
        let resultado = texto;
        palabras.forEach(palabra => {
            const regex = new RegExp(`(${palabra.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            resultado = resultado.replace(regex, `<span class="highlight">$1</span>`);
        });
        return resultado;
    }
    
    function actualizarListaInscritos() {
        const container = document.getElementById('listaInscritosContainer');
        if (!container) return;
        let filtrados = inscritos;
        const term = searchTerm.trim().toLowerCase();
        if (term) {
            filtrados = inscritos.filter(i => 
                i.nombre.toLowerCase().includes(term) || 
                i.apellido.toLowerCase().includes(term) || 
                i.ci.toString().includes(term)
            );
        }
        if (filtrados.length === 0) {
            container.innerHTML = `<div class="no-results">No se encontraron inscritos</div>`;
            return;
        }
        let html = '';
        filtrados.forEach(i => {
            const nombreRes = resaltarPalabras(i.nombre, searchTerm);
            const apellidoRes = resaltarPalabras(i.apellido, searchTerm);
            const ciRes = resaltarPalabras(i.ci.toString(), searchTerm);
            html += `
                <div class="list-item">
                    <div class="inscrito-info">
                        <strong>${nombreRes} ${apellidoRes}</strong><br>
                        CI: ${ciRes} | ${i.correo}
                        ${i.comprobante ? `<img src="${i.comprobante}" class="img-thumb" onclick="verImagen('${i.comprobante}')">` : ''}
                    </div>
                    <div class="inscrito-actions">
                        <button class="btn btn-sm ${i.pagoVerificado ? 'btn-warning' : 'btn-success'}" onclick="togglePago('${i.id}')">
                            ${i.pagoVerificado ? 'Quitar pago' : 'Validar pago'}
                        </button>
                        <button class="btn btn-sm ${i.presente ? 'btn-warning' : 'btn-success'}" onclick="toggleAsistencia('${i.id}')">
                            ${i.presente ? 'Quitar asistencia' : 'Marcar asistencia'}
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarInscrito('${i.id}', '${i.nombre} ${i.apellido}')">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                        <button class="btn btn-sm" onclick="mostrarCarnetAdmin('${i.nombre} ${i.apellido}', '${i.ci}', '${i.id}')">
                            <i class="fas fa-id-card"></i> Carnet

            if (data) {
                data.pagoVerificado = !data.pagoVerificado;
                ref.set(data);
            }
        });
    }
    
    function toggleAsistencia(id) {
        const ref = db.ref('inscritos/' + id);
        ref.once('value').then(snap => {
            let data = snap.val();
            if (data) {
                data.presente = !data.presente;
                ref.set(data);

    // ==================== ESCÁNER QR ====================
    function iniciarEscaner() {
        const video = document.getElementById('scannerVideo');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
            scannerStream = stream;
            video.srcObject = stream;
            video.play();
            document.getElementById('btnIniciar').style.display = 'none';
            document.getElementById('btnDetener').style.display = 'inline-block';
            scannerActive = true;
            escanearQR();
        }).catch(err => alert("Error cámara: "+err.message));
    }
    
    function detenerEscaner() {
        scannerActive = false;
        if (scannerAnimation) cancelAnimationFrame(scannerAnimation);
        if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
        const video = document.getElementById('scannerVideo');
        if (video) video.srcObject = null;
        document.getElementById('btnIniciar').style.display = 'inline-block';
        document.getElementById('btnDetener').style.display = 'none';
    }
    
    function escanearQR() {
        if (!scannerActive) return;
        const video = document.getElementById('scannerVideo');
        if (video.videoWidth === 0) { scannerAnimation = requestAnimationFrame(escanearQR); return; }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth * 0.5;
        canvas.height = video.videoHeight * 0.5;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);
        if (code) {
            const qrText = code.data;
            let id = null;
            const match = qrText.match(/ID:\s*(\d+)/i);
            if (match) id = match[1];
            else if (/^\d+$/.test(qrText)) id = qrText;
            const inscrito = inscritos.find(i => i.id === id);
            const resultadoDiv = document.getElementById('scannerResultado');
            if (inscrito) {
                resultadoDiv.innerHTML = `
                    <div style="background:#e2e8f0; padding:8px; border-radius:8px;">
                        <strong>${inscrito.nombre} ${inscrito.apellido}</strong><br>
                        CI: ${inscrito.ci}<br>
                        Asistencia actual: ${inscrito.presente ? 'Presente' : 'Ausente'}<br>
                        <button class="btn btn-sm" onclick="cambiarAsistenciaDesdeEscaner('${inscrito.id}')">Cambiar asistencia</button>
                    </div>
                `;
            } else {
                resultadoDiv.innerHTML = '<span style="color:red;">Código no válido</span>';
                setTimeout(() => resultadoDiv.innerHTML = '', 2000);
            }
            return;
        }
        scannerAnimation = requestAnimationFrame(escanearQR);
    }
    
    function cambiarAsistenciaDesdeEscaner(id) {
        const idx = inscritos.findIndex(i => i.id === id);
        if (idx !== -1) {
            inscritos[idx].presente = !inscritos[idx].presente;
            db.ref('inscritos/' + id).set(inscritos[idx]);
            document.getElementById('scannerResultado').innerHTML = `<span style="color:green;">✅ Asistencia cambiada</span>`;
            setTimeout(() => document.getElementById('scannerResultado').innerHTML = '', 1500);
        }
    }

    function exportarAgendaPDF() {
        const logoImg = document.querySelector('.logo-area img')?.src || 'assets/logo.png';
        const dia1 = new Date(eventInfo.fechaInicio).toLocaleDateString('es-ES');
        const dia2 = new Date(eventInfo.fechaFin).toLocaleDateString('es-ES');
        let html = `<div style="font-family:'Inter',sans-serif; padding:20px;"><div style="text-align:center;"><img src="${logoImg}" style="height:60px;"><h2>AGENDA DEL SEMINARIO</h2><p>${dia1} y ${dia2} | ${eventInfo.horaInicio} - ${eventInfo.horaFin}<br>${eventInfo.ubicacion}</p></div>`;
        for (let d=1; d<=2; d++) {
            const actividades = agenda.filter(a => a.dia == d).sort((a,b)=>a.hora.localeCompare(b.hora));
            html += `<h3>Día ${d} - ${d===1?dia1:dia2}</h3><table style="width:100%; border-collapse:collapse;"><thead><tr style="background:#0f3460; color:white;"><th>Hora</th><th>Tema</th><th>Expositor</th></tr></thead><tbody>`;
            actividades.forEach(a => html += `<tr><td>${a.hora}</td><td>${a.tema}</td><td>${a.speaker || '---'}</td></tr>`);
            html += `</tbody></table><br>`;
        }
        html += `<div style="text-align:center;">Seminario USCA - ${dia1}</div></div>`;
        const element = document.createElement('div');
        element.innerHTML = html;
        document.body.appendChild(element);
        html2pdf().set({ margin: 0.5, filename: `agenda_completa.pdf`, html2canvas: { scale: 2 } }).from(element).save().then(() => element.remove());
    }
    
    // ==================== NAVEGACIÓN Y UTILS ====================
    function cambiarSeccion(seccion) {
        const content = document.getElementById('mainContent');
        if (seccion === 'dashboard') {
            content.innerHTML = renderDashboard();
            setTimeout(() => actualizarDashboard(), 100);
        } else if (seccion === 'evento') {
            content.innerHTML = renderEvento();
            cargarEventoAlFormulario();
        } else if (seccion === 'agenda') {
            content.innerHTML = renderAgenda();
            actualizarListaAgenda();
        } else if (seccion === 'auspiciantes') {
            content.innerHTML = renderAuspiciantes();
            actualizarListaAuspiciantes();
        } else if (seccion === 'inscritos') {
            content.innerHTML = renderInscritos();
            actualizarListaInscritos();
        } else if (seccion === 'scanner') {
            content.innerHTML = renderScanner();
        }
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${seccion}"]`).classList.add('active');
        if (seccion !== 'scanner') detenerEscaner();
    }
    
    window.buscarInscritos = function() {
        const input = document.getElementById('searchInput');
        searchTerm = input ? input.value : '';
        actualizarListaInscritos();
    };
    window.limpiarBusqueda = function() {
        searchTerm = '';
        const input = document.getElementById('searchInput');

    // ==================== LOGIN ====================
    function verificarLogin() {
        const pass = document.getElementById('adminPassword').value;
        if (pass === 'usca2026') {
            sessionStorage.setItem('adminLogged', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            cargarDatos();
            cambiarSeccion('dashboard');
        } else {
            document.getElementById('loginError').innerText = 'Contraseña incorrecta';

    function cerrarSesion() {
        sessionStorage.removeItem('adminLogged');
        detenerEscaner();
        document.getElementById('adminPanel').classList.remove('active');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerText = '';
