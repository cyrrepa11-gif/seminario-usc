<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Administrador - Seminario USCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Estilos responsive y mejoras */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #2c3e50;
        }
        /* Pantalla de login */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%);
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .login-card h2 {
            color: #0f3460;
            font-family: 'Playfair Display', serif;
            margin-bottom: 1rem;
        }
        .login-card input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
        }
        .login-card button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-msg {
            color: #e94560;
            margin-top: 0.5rem;
        }
        /* Panel Admin */
        .admin-panel {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .admin-panel.active {
            display: flex;
        }
        .admin-header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo-area img {
            height: 50px;
        }
        .logo-area h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f3460;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn-logout {
            background: #e94560;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
        }
        .admin-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 1rem 0;
            overflow-y: auto;
        }
        .nav-item {
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
            color: #475569;
            font-weight: 500;
            margin: 0.2rem 0.5rem;
            border-radius: 10px;
        }
        .nav-item i {
            width: 24px;
            font-size: 1rem;
        }
        .nav-item.active {
            background: #0f3460;
            color: white;
        }
        .nav-item:hover:not(.active) {
            background: #f1f5f9;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f1f5f9;
        }
        /* Tarjetas KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .kpi-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f3460;
        }
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #0f3460;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-group {
            margin-bottom: 0.8rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
        }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .btn-sm {
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }
        .btn-danger {
            background: #dc2626;
        }
        .list-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-left: 4px solid #e94560;
        }
        .inscrito-info {
            flex: 2;
            min-width: 150px;
        }
        .inscrito-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .img-thumb {
            width: 30px;
            height: 30px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
        }
        .highlight {
            background-color: #fef08a;
        }
        .search-container, .filtros-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .filtros-container select, .filtros-container input {
            flex: 1;
            min-width: 120px;
        }
        #scannerVideo {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
        }
        .modal-imagen, .modal-carnet-admin {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-imagen.active, .modal-carnet-admin.active {
            display: flex;
        }
        .carnet-preview {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        .carnet {
            background: linear-gradient(135deg, #0f3460 0%, #1a4d7a 100%);
            color: white;
            border-radius: 16px;
            padding: 1.5rem;
        }
        .close-carnet-x {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 24px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            .admin-layout {
                flex-direction: column;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .search-container, .filtros-container {
                flex-direction: column;
            }
            .list-item {
                flex-direction: column;
                align-items: stretch;
            }
            .inscrito-actions {
                justify-content: flex-end;
            }
        }
        /* Pestañas días */
        .dias-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }
        .dia-tab {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-radius: 30px;
        }
        .dia-tab.active {
            background: #0f3460;
            color: white;
        }
        .form-agregar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .form-agregar input, .form-agregar select {
            flex: 1;
            min-width: 120px;
        }
        @media (max-width: 768px) {
            .form-agregar {
                flex-direction: column;
            }
            .form-agregar input, .form-agregar button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- Pantalla de login -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <i class="fas fa-lock" style="font-size: 3rem; color:#0f3460;"></i>
        <h2>Acceso Administrador</h2>
        <input type="password" id="adminPassword" placeholder="Contraseña" onkeypress="if(event.key==='Enter') verificarLogin()">
        <button onclick="verificarLogin()">Ingresar</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- Panel Admin -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <div class="logo-area">
            <img src="assets/logo.png" alt="Logo">
            <h1>ADMINISTRADOR</h1>
        </div>
        <div class="user-area">
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-item" data-tab="evento"><i class="fas fa-calendar-alt"></i> Evento</div>
            <div class="nav-item" data-tab="agenda"><i class="fas fa-list-ul"></i> Agenda</div>
            <div class="nav-item" data-tab="auspiciantes"><i class="fas fa-handshake"></i> Auspiciantes</div>
            <div class="nav-item" data-tab="inscritos"><i class="fas fa-users"></i> Inscritos</div>
            <div class="nav-item" data-tab="scanner"><i class="fas fa-qrcode"></i> Escáner QR</div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </div>
</div>

<!-- Modal para ver imagen -->
<div id="modalImagen" class="modal-imagen" onclick="cerrarModalImagen()"><img id="imgGrande" src=""></div>

<!-- Modal carnet -->
<div id="modalCarnetAdmin" class="modal-carnet-admin">
    <div class="carnet-preview">
        <span class="close-carnet-x" onclick="cerrarModalCarnetAdmin()">&times;</span>
        <div id="carnetAdminContent"></div>
        <button class="btn" onclick="descargarCarnetAdmin()">Descargar PNG</button>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDCMQjh5PCz2f17xxhMF0JkGAjliCBreUg",
        authDomain: "seminario-usca.firebaseapp.com",
        databaseURL: "https://seminario-usca-default-rtdb.firebaseio.com",
        projectId: "seminario-usca",
        storageBucket: "seminario-usca.firebasestorage.app",
        messagingSenderId: "560733409147",
        appId: "1:560733409147:web:13f01f10f3ee961ab677de"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ==================== FUNCIÓN DE SEGURIDAD ====================
    function safeGetElement(id) {
        const el = document.getElementById(id);
        if (!el) console.warn(`Elemento no encontrado: ${id}`);
        return el;
    }
    
    // ==================== VARIABLES GLOBALES ====================
    let agenda = [];            // { id, dia, hora, tema, speaker }
    let auspiciantes = [];
    let inscritos = [];
    let eventInfo = { 
        descripcion: "", 
        fechaInicio: "", 
        fechaFin: "", 
        horaInicio: "08:00", 
        horaFin: "17:00",
        ubicacion: "USCA"
    };
    let scannerActive = false, scannerStream = null, scannerAnimation = null;
    let searchTerm = '';
    let filtros = { facultad: '', carrera: '', semestreAnio: '' };
    let currentDiaAdmin = 1;
    let myChart = null; // para el gráfico

    // ==================== SESIÓN (persistente) ====================
    function checkSession() {
        const loginScreen = safeGetElement('loginScreen');
        const adminPanel = safeGetElement('adminPanel');
        if (sessionStorage.getItem('adminLogged') === 'true') {
            if (loginScreen) loginScreen.style.display = 'none';
            if (adminPanel) adminPanel.classList.add('active');
            cargarDatos();
            cambiarSeccion('dashboard');
        } else {
            if (loginScreen) loginScreen.style.display = 'flex';
            if (adminPanel) adminPanel.classList.remove('active');
        }
    }

    // ==================== CARGA DE DATOS EN TIEMPO REAL ====================
    function cargarDatos() {
        db.ref('agenda').on('value', snap => {
            const data = snap.val();
            agenda = data ? Object.values(data) : [];
            if (safeGetElement('listaAgenda')) actualizarListaAgenda();
            if (safeGetElement('chartInscritos')) actualizarDashboard();
        });
        db.ref('auspiciantes').on('value', snap => {
            const data = snap.val();
            auspiciantes = data ? Object.values(data) : [];
            if (safeGetElement('listaAuspiciantes')) actualizarListaAuspiciantes();
        });
        db.ref('inscritos').on('value', snap => {
            const data = snap.val();
            inscritos = data ? Object.values(data) : [];
            if (safeGetElement('listaInscritosContainer')) actualizarListaInscritos();
            if (safeGetElement('chartInscritos')) actualizarDashboard();
        });
        db.ref('evento').on('value', snap => {
            if (snap.val()) eventInfo = snap.val();
            else {
                eventInfo = {
                    descripcion: "El III Seminario de Actualización Quirúrgica es un evento de formación...",
                    fechaInicio: "2026-08-08",
                    fechaFin: "2026-08-09",
                    horaInicio: "08:00",
                    horaFin: "17:00",
                    ubicacion: "USCA - Caaguazú"
                };
                db.ref('evento').set(eventInfo);
            }
            if (safeGetElement('descEvento')) cargarEventoAlFormulario();
            if (safeGetElement('chartInscritos')) actualizarDashboard();
        });
    }

    // ==================== DASHBOARD ====================
    function actualizarDashboard() {
        const kpiContainer = safeGetElement('kpiContainer');
        const resumenEvento = safeGetElement('resumenEvento');
        const chartCanvas = safeGetElement('chartInscritos');
        if (!kpiContainer || !resumenEvento) return;
        
        const total = inscritos.length;
        const pagos = inscritos.filter(i => i.pagoVerificado).length;
        const presentes = inscritos.filter(i => i.presente).length;
        kpiContainer.innerHTML = `
            <div class="kpi-card"><div><div class="kpi-number">${total}</div><div>Inscritos</div></div><i class="fas fa-users"></i></div>
            <div class="kpi-card"><div><div class="kpi-number">${pagos}</div><div>Pagos OK</div></div><i class="fas fa-credit-card"></i></div>
            <div class="kpi-card"><div><div class="kpi-number">${presentes}</div><div>Asistencia</div></div><i class="fas fa-check-circle"></i></div>
            <div class="kpi-card"><div><div class="kpi-number">${agenda.length}</div><div>Actividades</div></div><i class="fas fa-calendar"></i></div>
        `;
        const fechaInicio = new Date(eventInfo.fechaInicio).toLocaleDateString('es-ES');
        const fechaFin = new Date(eventInfo.fechaFin).toLocaleDateString('es-ES');
        resumenEvento.innerHTML = `📅 ${fechaInicio} - ${fechaFin} | ${eventInfo.horaInicio} a ${eventInfo.horaFin}<br>📍 ${eventInfo.ubicacion}`;
        
        if (chartCanvas && typeof Chart !== 'undefined') {
            if (myChart) myChart.destroy();
            const ctx = chartCanvas.getContext('2d');
            myChart = new Chart(ctx, { 
                type: 'doughnut', 
                data: { labels: ['Confirmados', 'Pendientes'], datasets: [{ data: [presentes, total - presentes], backgroundColor: ['#16c784', '#e94560'] }] } 
            });
        }
    }

    // ==================== EVENTO ====================
    function cargarEventoAlFormulario() {
        const desc = safeGetElement('descEvento');
        if (desc) desc.value = eventInfo.descripcion || '';
        const fechaInicio = safeGetElement('fechaInicio');
        if (fechaInicio) fechaInicio.value = eventInfo.fechaInicio;
        const fechaFin = safeGetElement('fechaFin');
        if (fechaFin) fechaFin.value = eventInfo.fechaFin;
        const horaInicio = safeGetElement('horaInicio');
        if (horaInicio) horaInicio.value = eventInfo.horaInicio;
        const horaFin = safeGetElement('horaFin');
        if (horaFin) horaFin.value = eventInfo.horaFin;
        const ubicacion = safeGetElement('ubicacion');
        if (ubicacion) ubicacion.value = eventInfo.ubicacion || "USCA";
    }

    function guardarEvento() {
        eventInfo.descripcion = safeGetElement('descEvento')?.value || '';
        eventInfo.fechaInicio = safeGetElement('fechaInicio')?.value || '';
        eventInfo.fechaFin = safeGetElement('fechaFin')?.value || '';
        eventInfo.horaInicio = safeGetElement('horaInicio')?.value || '';
        eventInfo.horaFin = safeGetElement('horaFin')?.value || '';
        eventInfo.ubicacion = safeGetElement('ubicacion')?.value || '';
        db.ref('evento').set(eventInfo).then(() => alert("Evento actualizado")).catch(e => alert("Error: " + e.message));
        cambiarSeccion('dashboard');
    }

    // ==================== AGENDA (2 días, ordenada) ====================
    function actualizarListaAgenda() {
        const container = safeGetElement('listaAgenda');
        if (!container) return;
        const agendaDia = agenda.filter(item => item.dia == currentDiaAdmin).sort((a, b) => a.hora.localeCompare(b.hora));
        if (agendaDia.length === 0) {
            container.innerHTML = '<p>No hay actividades para este día.</p>';
            return;
        }
        container.innerHTML = agendaDia.map(a => `
            <div class="list-item">
                <div><strong>${a.hora}</strong> - ${a.tema}<br><small>${a.speaker || ''}</small></div>
                <button class="btn btn-sm btn-danger" onclick="eliminarActividad('${a.id}')">Eliminar</button>
            </div>
        `).join('');
    }

    function agregarActividad() {
        let hora = safeGetElement('nuevaHora')?.value;
        let tema = safeGetElement('nuevoTema')?.value.trim();
        let speaker = safeGetElement('nuevoSpeaker')?.value.trim();
        if (!hora || !tema) { alert("Completa hora y tema"); return; }
        const newId = Date.now().toString();
        db.ref('agenda/' + newId).set({ id: newId, dia: currentDiaAdmin, hora, tema, speaker })
            .then(() => {
                if (safeGetElement('nuevaHora')) safeGetElement('nuevaHora').value = '';
                if (safeGetElement('nuevoTema')) safeGetElement('nuevoTema').value = '';
                if (safeGetElement('nuevoSpeaker')) safeGetElement('nuevoSpeaker').value = '';
                cambiarSeccion('agenda');
            }).catch(err => alert("Error: " + err.message));
    }

    function eliminarActividad(id) {
        if (confirm("¿Eliminar esta actividad?")) db.ref('agenda/' + id).remove().then(() => cambiarSeccion('agenda'));
    }

    function cambiarDiaAdmin(dia) {
        currentDiaAdmin = dia;
        document.querySelectorAll('.dia-tab').forEach(tab => tab.classList.remove('active'));
        const activeTab = safeGetElement(`tabDia${dia}`);
        if (activeTab) activeTab.classList.add('active');
        actualizarListaAgenda();
    }

    // ==================== AUSPICIANTES ====================
    function actualizarListaAuspiciantes() {
        const container = safeGetElement('listaAuspiciantes');
        if (!container) return;
        container.innerHTML = auspiciantes.map(a => `
            <div class="list-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    ${a.imagen ? `<img src="${a.imagen}" style="height:40px;">` : '<i class="fas fa-building"></i>'}
                    <strong>${a.nombre}</strong>
                </div>
                <button class="btn btn-sm btn-danger" onclick="eliminarAuspiciante('${a.id}')">Eliminar</button>
            </div>
        `).join('');
    }

    function agregarAuspiciante() {
        let nombre = safeGetElement('nombreAuspiciante')?.value.trim();
        if (!nombre) { alert("Ingrese nombre"); return; }
        const file = safeGetElement('imagenAuspiciante')?.files[0];
        const newId = Date.now().toString();
        const setData = (img) => {
            db.ref('auspiciantes/' + newId).set({ id: newId, nombre, imagen: img || null })
                .then(() => cambiarSeccion('auspiciantes'))
                .catch(err => alert("Error: " + err.message));
        };
        if (file) {
            const reader = new FileReader();
            reader.onload = e => setData(e.target.result);
            reader.readAsDataURL(file);
        } else {
            setData(null);
        }
        if (safeGetElement('nombreAuspiciante')) safeGetElement('nombreAuspiciante').value = '';
        if (safeGetElement('imagenAuspiciante')) safeGetElement('imagenAuspiciante').value = '';
    }

    function eliminarAuspiciante(id) {
        if (confirm("¿Eliminar auspiciante?")) db.ref('auspiciantes/' + id).remove().then(() => cambiarSeccion('auspiciantes'));
    }

    // ==================== INSCRITOS (con filtros y orden) ====================
    function aplicarFiltros() {
        const filtroFacultad = safeGetElement('filtroFacultad');
        const filtroCarrera = safeGetElement('filtroCarrera');
        const filtroSemestre = safeGetElement('filtroSemestre');
        if (filtroFacultad) filtros.facultad = filtroFacultad.value;
        if (filtroCarrera) filtros.carrera = filtroCarrera.value;
        if (filtroSemestre) filtros.semestreAnio = filtroSemestre.value;

    function actualizarListaInscritos() {
        const container = safeGetElement('listaInscritosContainer');
        if (!container) return;

        let filtrados = [...inscritos];
        const term = searchTerm.trim().toLowerCase();
        if (term) {
            filtrados = filtrados.filter(i => 
                i.nombre.toLowerCase().includes(term) || 
                i.apellido.toLowerCase().includes(term) || 
                i.ci.toString().includes(term)
            );
        }
        if (filtros.facultad) filtrados = filtrados.filter(i => i.facultad === filtros.facultad);
        if (filtros.carrera) filtrados = filtrados.filter(i => i.carrera === filtros.carrera);
        if (filtros.semestreAnio) filtrados = filtrados.filter(i => i.semestreAnio == filtros.semestreAnio);

        filtrados.sort((a, b) => `${a.nombre} ${a.apellido}`.localeCompare(`${b.nombre} ${b.apellido}`));

        if (filtrados.length === 0) {
            container.innerHTML = '<div class="no-results">No se encontraron inscritos</div>';
            return;
        }

        let html = '';
        filtrados.forEach(i => {
            html += `
                <div class="list-item">

                        <strong>${i.nombre} ${i.apellido}</strong><br>
                        CI: ${i.ci} | ${i.correo}<br>
                        <small>🎓 ${i.facultad || 'No especificada'} - ${i.carrera || 'No especificada'} - ${i.semestreAnio ? (i.carrera === 'Medicina' ? 'Semestre' : 'Año') + ' ' + i.semestreAnio : ''}</small>

                    </div>
                    <div class="inscrito-actions">
                        <button class="btn btn-sm ${i.pagoVerificado ? 'btn-warning' : 'btn-success'}" onclick="togglePago('${i.id}')">
                            ${i.pagoVerificado ? 'Quitar pago' : 'Validar pago'}
                        </button>
                        <button class="btn btn-sm ${i.presente ? 'btn-warning' : 'btn-success'}" onclick="toggleAsistencia('${i.id}')">
                            ${i.presente ? 'Quitar asistencia' : 'Marcar asistencia'}

    function togglePago(id) {
        const ref = db.ref('inscritos/' + id);
        ref.once('value').then(snap => {
            let data = snap.val();
            if (data) {
                data.pagoVerificado = !data.pagoVerificado;

    function toggleAsistencia(id) {
        const ref = db.ref('inscritos/' + id);
        ref.once('value').then(snap => {
            let data = snap.val();
            if (data) {

    // ==================== ESCÁNER QR OPTIMIZADO ====================
    function iniciarEscaner() {
        const video = safeGetElement('scannerVideo');
        if (!video) return;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
            scannerStream = stream;
            video.srcObject = stream;
            video.play();
            const btnIniciar = safeGetElement('btnIniciar');
            const btnDetener = safeGetElement('btnDetener');
            if (btnIniciar) btnIniciar.style.display = 'none';
            if (btnDetener) btnDetener.style.display = 'inline-block';
            scannerActive = true;
            escanearQR();
        }).catch(err => alert("Error cámara: " + err.message));
    }

    function detenerEscaner() {
        scannerActive = false;
        if (scannerAnimation) cancelAnimationFrame(scannerAnimation);
        if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
        const video = safeGetElement('scannerVideo');
        if (video) video.srcObject = null;
        const btnIniciar = safeGetElement('btnIniciar');
        const btnDetener = safeGetElement('btnDetener');
        if (btnIniciar) btnIniciar.style.display = 'inline-block';
        if (btnDetener) btnDetener.style.display = 'none';
    }

    function escanearQR() {
        if (!scannerActive) return;
        const video = safeGetElement('scannerVideo');
        if (!video || video.videoWidth === 0) { scannerAnimation = requestAnimationFrame(escanearQR); return; }
        const scale = 0.4;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth * scale;
        canvas.height = video.videoHeight * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);
        if (code) {
            const qrText = code.data;
            let id = null;
            const match = qrText.match(/ID:\s*(\d+)/i);
            if (match) id = match[1];
            else if (/^\d+$/.test(qrText)) id = qrText;
            const inscrito = inscritos.find(i => i.id === id);
            const resultadoDiv = safeGetElement('scannerResultado');
            if (resultadoDiv) {
                if (inscrito) {
                    resultadoDiv.innerHTML = `
                        <div style="background:#e2e8f0; padding:8px; border-radius:8px; margin-top:8px;">
                            <strong>${inscrito.nombre} ${inscrito.apellido}</strong><br>
                            CI: ${inscrito.ci}<br>
                            Facultad: ${inscrito.facultad || '-'}<br>
                            Carrera: ${inscrito.carrera || '-'}<br>
                            Semestre/Año: ${inscrito.semestreAnio || '-'}<br>
                            Asistencia actual: ${inscrito.presente ? 'Presente' : 'Ausente'}<br>
                            <button class="btn btn-sm" onclick="cambiarAsistenciaDesdeEscaner('${inscrito.id}')">Cambiar asistencia</button>
                        </div>
                    `;
                } else {
                    resultadoDiv.innerHTML = '<span style="color:red;">Código no válido</span>';
                    setTimeout(() => resultadoDiv.innerHTML = '', 2000);
                }
            }
            setTimeout(() => { if (scannerActive) requestAnimationFrame(escanearQR); }, 500);
            return;
        }
        scannerAnimation = requestAnimationFrame(escanearQR);
    }

    function cambiarAsistenciaDesdeEscaner(id) {
        const idx = inscritos.findIndex(i => i.id === id);
        if (idx !== -1) {
            inscritos[idx].presente = !inscritos[idx].presente;
            db.ref('inscritos/' + id).set(inscritos[idx]);
            const resultadoDiv = safeGetElement('scannerResultado');
            if (resultadoDiv) {
                resultadoDiv.innerHTML = `<span style="color:green;">✅ Asistencia cambiada a ${inscritos[idx].presente ? 'Presente' : 'Ausente'}</span>`;
                setTimeout(() => resultadoDiv.innerHTML = '', 1500);
            }
        }
    }

        } else {
            const errorMsg = safeGetElement('loginError');
            if (errorMsg) errorMsg.innerText = 'Contraseña incorrecta';
        }
    }

    function cerrarSesion() {
        sessionStorage.removeItem('adminLogged');
        detenerEscaner();
        const adminPanel = safeGetElement('adminPanel');
        const loginScreen = safeGetElement('loginScreen');
        const passInput = safeGetElement('adminPassword');
        const errorMsg = safeGetElement('loginError');
        if (adminPanel) adminPanel.classList.remove('active');
        if (loginScreen) loginScreen.style.display = 'flex';
        if (passInput) passInput.value = '';
        if (errorMsg) errorMsg.innerText = '';
        window.location.reload();
    }

    // Exponer funciones globales
    window.verificarLogin = verificarLogin;
    window.cerrarSesion = cerrarSesion;
    window.cambiarSeccion = cambiarSeccion;
    window.guardarEvento = guardarEvento;
    window.agregarActividad = agregarActividad;
    window.eliminarActividad = eliminarActividad;
    window.agregarAuspiciante = agregarAuspiciante;
    window.eliminarAuspiciante = eliminarAuspiciante;
    window.togglePago = togglePago;
    window.toggleAsistencia = toggleAsistencia;
    window.eliminarInscrito = eliminarInscrito;
    window.mostrarCarnetAdmin = mostrarCarnetAdmin;
    window.cerrarModalCarnetAdmin = cerrarModalCarnetAdmin;
    window.descargarCarnetAdmin = descargarCarnetAdmin;
    window.iniciarEscaner = iniciarEscaner;
    window.detenerEscaner = detenerEscaner;
    window.cambiarAsistenciaDesdeEscaner = cambiarAsistenciaDesdeEscaner;
    window.exportarInscritosPDF = exportarInscritosPDF;
    window.exportarAgendaPDF = exportarAgendaPDF;
    window.cambiarDiaAdmin = cambiarDiaAdmin;
    window.buscarInscritos = buscarInscritos;
    window.limpiarBusqueda = limpiarBusqueda;
    window.verImagen = verImagen;
    window.cerrarModalImagen = cerrarModalImagen;
    window.aplicarFiltros = aplicarFiltros;

    // Eventos del sidebar
    document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => cambiarSeccion(el.getAttribute('data-tab')));
    });

    checkSession();
</script>
</body>
</html>
